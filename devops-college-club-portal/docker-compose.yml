
services:
  # ── MySQL Database ─────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: college_club_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: college_club_db
      MYSQL_USER: club_user
      MYSQL_PASSWORD: club_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - club_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: college_club_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: college_club_db
      DB_USER: club_user
      DB_PASSWORD: club_pass123
      JWT_SECRET: super_secret_jwt_key_change_in_production_2024
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - club_network
    volumes:
      - ./backend/logs:/app/logs

  # ── React Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: college_club_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - club_network

  # ── NGINX Reverse Proxy ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: college_club_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - club_network

# ── Volumes ────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Networks ───────────────────────────────────
networks:
  club_network:
    driver: bridge
